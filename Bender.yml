package:
  name: bingo_hw_manager
  authors:
    - Fanchen Kong <fanchen.kong@kuleuven.be>
    - Xiaoling Yi  <xiaoling.yi@kuleuven.be>
    - Yunhao Deng  <yunhao.deng@kuleuven.be>
dependencies:
  axi:          { git: https://github.com/pulp-platform/axi,              version:  0.39.1 }
  common_cells: { git: https://github.com/pulp-platform/common_cells.git, version:  1.37.0 }

sources:
  # Source files grouped in levels. Files in level 0 have no dependencies on files in this package.
  # Files in level 1 only depend on files in level 0.
  # Files in level 2 on files in levels 1 and 0, etc.

  # Level 0
  - src/bingo_hw_manager_mailbox_adapter.sv    # AXI Lite to Mailbox Adapter
  - src/bingo_hw_manager_read_mailbox.sv       # AXI Lite read Mailbox Module
  - src/bingo_hw_manager_write_mailbox.sv      # AXI Lite write Mailbox Module
  - src/bingo_hw_manager_task_queue_master.sv  # Task Queue Master Module
  - src/bingo_hw_manager_csr_to_fifo_write.sv  # CSR to FIFO Write 
  - src/bingo_hw_manager_csr_to_fifo_read.sv   # CSR to FIFO Read
  - src/bingo_hw_manager_csr_to_fifo.sv        # CSR to FIFO Interface Module
  # Level 1
  - src/bingo_hw_manager_cond_exec_controller.sv # DARTS: CERF
  - src/bingo_hw_manager_load_monitor.sv         # DARTS: Load Monitor
  - src/bingo_hw_manager_dep_matrix.sv         # Dependency Matrix Module
  - src/bingo_hw_manager_chiplet_dep_set.sv    # Chiplet DependencySetModule (The Master port to send chiplet dep set info to other chiplets)
  - src/bingo_hw_manager_dep_check_manager.sv  # Dependency Check Manager Module
  - src/bingo_hw_manager_pm.sv                 # Power Management Module
  # Level 2
  - src/bingo_hw_manager_top.sv                # Top-level module
  - target: test
    files:
      - test/tb_bingo_hw_manager_dep_matrix.sv
      - test/tb_bingo_hw_manager_top.sv
      - test/tb_bingo_hw_manager_cerf_basic.sv
      - test/tb_bingo_hw_manager_cerf_skip.sv
      - test/tb_bingo_hw_manager_tagged.sv      # identity-aware deps end-to-end (EnableTaggedDeps=1)
      - test/tb_bingo_hw_manager_tagged_mc.sv   # identity-aware deps, MULTI-CLUSTER cross-cluster aliasing

  # NOTE: Generated test files in test/generated/ are NOT listed here.
  # They are picked up automatically by compile_vsim.sh via shell glob.
  # To regenerate: python3 scripts/run_all_tests.py --stress 50 --emit-sv